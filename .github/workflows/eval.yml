# ============================================================================
# Project A — Eval Regression Check
#
# Runs on every pull request to main.
# If any eval metric drops more than 5 percentage points below baseline,
# the workflow fails and the PR is blocked.
#
# Required secrets (set in GitHub repo Settings → Secrets → Actions):
#   OPENAI_API_KEY       — for embeddings + LLM-as-judge calls
#   LANGFUSE_PUBLIC_KEY  — for trace + score attachment
#   LANGFUSE_SECRET_KEY  — for trace + score attachment
#
# How it works:
#   1. Spins up a pgvector container (same image as local docker-compose)
#   2. Ingests the corpus
#   3. Runs eval_harness.py — produces eval_results.json
#   4. Runs check_regression.py — compares against baseline_scores.json
#   5. Exits 1 (blocks PR) if any metric regressed beyond threshold
#
# NOTE: This workflow costs real OpenAI API credits on every PR.
# The golden dataset at Week 1 has ~50 queries × ~3 LLM calls = ~150 calls.
# At GPT-4o-mini pricing that's roughly ₹3-5 per run.
# Costs scale with dataset size — keep this in mind as you expand the dataset.
# ============================================================================

name: Eval Regression Check

on:
  pull_request:
    branches: [main]
  # Also allow manual trigger for testing the workflow itself
  workflow_dispatch:

jobs:
  eval:
    name: Run eval and check for regressions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop123
          POSTGRES_DB: acmera_kb
        ports:
          - 5433:5432
        # Wait for postgres to be ready before running steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up database
        env:
          PG_HOST: localhost
          PG_PORT: 5433
          PG_USER: workshop
          PG_PASSWORD: workshop123
          PG_DATABASE: acmera_kb
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/setup_db.py

      - name: Ingest corpus
        env:
          PG_HOST: localhost
          PG_PORT: 5433
          PG_USER: workshop
          PG_PASSWORD: workshop123
          PG_DATABASE: acmera_kb
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ingest.py

      - name: Run eval harness
        env:
          PG_HOST: localhost
          PG_PORT: 5433
          PG_USER: workshop
          PG_PASSWORD: workshop123
          PG_DATABASE: acmera_kb
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: https://cloud.langfuse.com
        # --no-langfuse skips score attachment in CI to reduce API calls
        # Remove this flag if you want CI scores visible in LangFuse
        run: python scripts/eval_harness.py --no-langfuse

      - name: Check for regressions
        # check_regression.py exits with code 1 if any metric dropped > threshold
        # GitHub Actions treats non-zero exit as step failure → workflow fails → PR blocked
        run: python scripts/check_regression.py

      - name: Upload eval results
        # Always upload results as an artifact, even if regression check fails
        # This lets you inspect what the eval actually produced
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json
          retention-days: 30

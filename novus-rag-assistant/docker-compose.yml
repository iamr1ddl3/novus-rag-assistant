version: "3.8"

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: novus-rag-pgvector
    environment:
      POSTGRES_USER: novus
      POSTGRES_PASSWORD: novus123
      POSTGRES_DB: novus_kb
    ports:
      - "5433:5432"
    volumes:
      - novus_rag_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  novus_rag_pgdata:

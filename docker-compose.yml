version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: project-a-pgvector
    environment:
      POSTGRES_USER: novus
      POSTGRES_PASSWORD: novus123
      POSTGRES_DB: novus_kb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
